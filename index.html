body, button, input, select, textarea, h1, h2, p, span, div {
    font-family: 'M PLUS Rounded 1c', "Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN", sans-serif;
}

/* 英単語と選択肢の読みやすさ優先設定（余計なフォント名を削りスッキリに） */
.readable-eng-word, .readable-choice, ruby, rt {
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        ruby { ruby-align: center; }
        rt { font-size: 0.6em; color: #334155; font-weight: 800; }
        
        /* あいぼう選択画面用の薄いクリーム黄色・背景色 */
        .bg-app-cream { background-color: #fefce8 !important; }
        .bg-app-purple { background-color: #f3e8ff !important; }

        /* 正解のボタンだけをほんのり薄緑にする（文字色には影響しません） */
        button.btn-correct, .choice-btn-item.btn-correct {
            background-color: #f0fdf4 !important; /* ごく薄い緑 */

function startGame() {
    if (typeof allWordData === 'undefined') return;

    const uData = getUserData();
    if (!uData.totalCorrectPerWord) uData.totalCorrectPerWord = {};
    if (!uData.mistakes) uData.mistakes = {};

    let targetLevel = 1;
for (let l = 1; l <= 3; l++) {
    const levelWords = allWordData.filter(w => w.level === l);
    const hasRemaining = levelWords.some(w => !uData.totalCorrectPerWord[w.word]);
    if (hasRemaining) {
        targetLevel = l; // 未クリアのレベルを見つけた時だけ代入して抜ける
        break;
    }
}

    let priorityPool = allWordData.filter(w => {
        if (w.level !== targetLevel) return false;
        const correctCount = uData.totalCorrectPerWord[w.word] || 0;
        const mistakeCount = uData.mistakes[w.word] || 0;
        return correctCount === 0 || mistakeCount > 0;
    });

    let nextLevelPool = allWordData.filter(w => w.level > targetLevel);

    let masteredPool = allWordData.filter(w => 
        w.level === targetLevel && (uData.totalCorrectPerWord[w.word] || 0) > 0 && (uData.mistakes[w.word] || 0) === 0
    );

    let selection = [];
    selection = shuffleArray(priorityPool).slice(0, 10);

    if (selection.length < 10) {
        const extraNext = shuffleArray(nextLevelPool).filter(w => !selection.includes(w)).slice(0, 10 - selection.length);
        selection = [...selection, ...extraNext];
    }

    if (selection.length < 10) {
        const extraMastered = shuffleArray(masteredPool).filter(w => !selection.includes(w)).slice(0, 10 - selection.length);
        selection = [...selection, ...extraMastered];
    }

    currentSessionWords = shuffleArray(selection);
    currentQuestionIndex = 0; 
    currentScore = 0; 
    showQuestion();
}

function showQuestion() {
    isAnswering = false;
    if (currentQuestionIndex >= currentSessionWords.length) { showResultScreen(); return; }
    const uData = getUserData();
    const currentQ = currentSessionWords[currentQuestionIndex];
    let choices = shuffleArray(currentQ.choices.map((c, i) => ({t:c, i:i})));
    // 「もり」の背景色をボタントーンと差別化するため bg-emerald-100/70 に調整
    const theme = { "0": { bg: "bg-red-50", btn: "bg-white border-red-200" }, "1": { bg: "bg-blue-50", btn: "bg-white border-blue-200" }, "2": { bg: "bg-emerald-100/70", btn: "bg-white border-emerald-200" } }[uData.eggType] || { bg: "bg-slate-50", btn: "bg-white border-slate-200" };

    appContainer.className = `max-w-2xl mx-auto min-h-screen flex flex-col shadow-2xl relative overflow-hidden ${theme.bg}`;
    appContainer.innerHTML = `
    <div class="px-6 pt-4 pb-24 flex flex-col items-center min-h-screen w-full transition-colors duration-500 justify-start">
        <p class="mb-2 text-slate-500 font-bold text-sm">第 ${currentQuestionIndex + 1} 問</p>
        <div class="relative mb-6 flex items-center justify-center min-h-[90px]">
            <h2 class="text-6xl font-black text-slate-800 readable-eng-word">${currentQ.word}</h2>
            <div id="overlay" class="absolute inset-0 hidden items-center justify-center text-9xl font-bold z-50 pointer-events-none opacity-80"></div>
        </div>
        <div id="choices" class="grid grid-cols-1 gap-4 w-full max-w-md"></div>
    </div>`;

    const choicesContainer = document.getElementById('choices');
    
    choices.forEach((c) => {
        const b = document.createElement('button');
        b.className = `px-6 h-28 flex items-center justify-center text-center border-2 ${theme.btn} rounded-3xl font-bold text-2xl shadow-md transition-all transform active:scale-95 readable-choice choice-btn-item text-slate-800 w-full`;
        b.innerHTML = `<span class="inline-block vertical-align-middle leading-snug w-full">${c.t}</span>`;
        b.dataset.isCorrect = (c.i === currentQ.answer);

        b.onclick = () => {
            if(isAnswering) return; 
            isAnswering = true;
            const correct = (c.i === currentQ.answer);
            const ov = document.getElementById('overlay');
            ov.innerHTML = correct ? '◯' : '✕';
            ov.style.color = correct ? '#ef4444' : '#3b82f6'; 
            ov.style.display = 'flex';
            
            const allButtons = choicesContainer.querySelectorAll('.choice-btn-item');
            allButtons.forEach(btn => {
                if (btn.dataset.isCorrect === 'true') {
                    btn.classList.add('btn-correct');
                }
            });
            
            if(correct) { 
                currentScore++; 
                currentQ.isUserCorrect = true;
                if (!uData.totalCorrectPerWord) uData.totalCorrectPerWord = {};
                
                if (!uData.totalCorrectPerWord[currentQ.word]) {
                    uData.totalCorrect++; 
                    uData.totalCorrectPerWord[currentQ.word] = 1;
                }
                
                if (uData.mistakes && uData.mistakes[currentQ.word] > 0) {
                    uData.mistakes[currentQ.word]--;
                }
            } else {
                currentQ.isUserCorrect = false;
                if (!uData.mistakes) uData.mistakes = {};
                uData.mistakes[currentQ.word] = (uData.mistakes[currentQ.word] || 0) + 1;
            }
            
            saveData();
            setTimeout(() => { currentQuestionIndex++; showQuestion(); }, 1500);
        };
        choicesContainer.appendChild(b);
    });
}

let correctText = originalWord ? originalWord.choices[originalWord.answer] : q.choices[q.answer];

if (correctText.includes('<br>')) {
